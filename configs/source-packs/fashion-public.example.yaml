# Example public source pack. Review source terms before enabling.
# Original RSS endpoints were checked during Stage 7 planning on 2026-06-12.
# Vogue, Business of Fashion, Red Carpet Fashion Awards, and PurseBlog RSS
# endpoints were checked during Stage 197 planning on 2026-06-25. RSS
# availability can change. Treat this as a starter set, not an endorsement or
# availability guarantee.
version: 1
sources:
  - name: Fashionista
    type: rss
    url: https://fashionista.com/.rss/excerpt
    enabled: true
    weight: 1.0
    tags: [fashion_media, industry_news]
    article:
      enabled: false
  - name: Fashion Week Daily
    type: rss
    url: https://fashionweekdaily.com/feed
    enabled: true
    weight: 0.9
    tags: [fashion_media, celebrity_style]
    article:
      enabled: false
  - name: FashionUnited
    type: rss
    url: https://fashionunited.info/rss-news
    enabled: true
    weight: 0.8
    tags: [industry_news, retail]
    article:
      enabled: false
  - name: The Industry Fashion
    type: rss
    url: https://www.theindustry.fashion/feed
    enabled: true
    weight: 0.9
    tags: [industry_news, brand_news]
    article:
      enabled: false
  - name: Highsnobiety
    type: rss
    url: https://www.highsnobiety.com/feed/
    enabled: true
    weight: 0.8
    tags: [streetwear, culture]
    article:
      enabled: false
  - name: WWD
    type: rss
    url: https://wwd.com/feed/rss
    enabled: true
    weight: 1.1
    tags: [trade_media, industry_news]
    article:
      enabled: false
  - name: Vogue
    type: rss
    url: https://www.vogue.com/feed/rss
    enabled: true
    weight: 1.0
    tags: [fashion_media, runway, fashion_week, celebrity_style]
    article:
      enabled: false
  - name: Business of Fashion
    type: rss
    url: https://www.businessoffashion.com/arc/outboundfeeds/rss/
    enabled: true
    weight: 1.0
    tags: [trade_media, industry_news, designer_brands, luxury, retail, emerging_designers]
    article:
      enabled: false
  - name: Red Carpet Fashion Awards
    type: rss
    url: https://www.redcarpet-fashionawards.com/feed/
    enabled: true
    weight: 0.8
    tags: [celebrity_style, red_carpet, fashion_media]
    article:
      enabled: false
  - name: PurseBlog
    type: rss
    url: https://www.purseblog.com/feed/
    enabled: true
    weight: 0.8
    tags: [products, accessories, bags, handbags, luxury]
    article:
      enabled: false
  - name: GDELT Luxury Fashion
    type: gdelt
    query: '(luxury fashion OR designer fashion OR "fashion week")'
    enabled: true
    weight: 0.9
    tags: [gdelt, luxury, industry_news]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
  - name: GDELT Celebrity Style
    type: gdelt
    query: '("celebrity style" OR "red carpet fashion" OR "red carpet look")'
    enabled: true
    weight: 0.8
    tags: [gdelt, celebrity_style]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
  - name: GDELT Bags Shoes Products
    type: gdelt
    query: '("designer bag" OR handbag OR sneakers OR "ballet flats" OR loafer) (fashion OR luxury)'
    enabled: true
    weight: 0.8
    tags: [gdelt, products, accessories, shoes]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
  - name: GDELT Emerging Designers
    type: gdelt
    query: '("emerging designer" OR "independent designer" OR "LVMH Prize" OR "ANDAM fashion")'
    enabled: true
    weight: 0.8
    tags: [gdelt, emerging_designers]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
  - name: GDELT Runway Fashion Week
    type: gdelt
    query: '("runway show" OR "fashion week schedule" OR "fashion week collection") (designer OR fashion)'
    enabled: true
    weight: 0.8
    tags: [gdelt, runway, fashion_week]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
  - name: GDELT Designer Brand Momentum
    type: gdelt
    query: '("designer brand" OR "quiet luxury" OR "heritage fashion house" OR "independent fashion label")'
    enabled: true
    weight: 0.8
    tags: [gdelt, designer_brands, luxury]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
  - name: GDELT Retail Resale Fashion
    type: gdelt
    query: '(fashion retail OR luxury retail OR resale marketplace OR consignment) (brand OR designer)'
    enabled: true
    weight: 0.7
    tags: [gdelt, retail, resale]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
  - name: GDELT Footwear Sneakers
    type: gdelt
    query: '(sneakers OR footwear OR loafers OR "ballet flats" OR boots) (fashion OR designer OR luxury)'
    enabled: true
    weight: 0.8
    tags: [gdelt, footwear, shoes, streetwear]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
  - name: GDELT Creative Director Moves
    type: gdelt
    query: '("creative director" OR "artistic director" OR "chief executive") ("fashion house" OR luxury OR designer)'
    enabled: true
    weight: 0.8
    tags: [gdelt, creative_directors, executive_moves]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
  - name: GDELT Beauty Fashion Crossover
    type: gdelt
    query: '(beauty OR fragrance OR makeup OR skincare) ("fashion brand" OR designer OR luxury)'
    enabled: true
    weight: 0.7
    tags: [gdelt, beauty, brand_news]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
