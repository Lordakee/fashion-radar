      timeout_seconds: 10
      per_domain_delay_seconds: 1
    health:
      max_failures: 3
      retention_hours: 24
  - name: GDELT Celebrity Style
    type: gdelt
    query: '("celebrity style" OR "red carpet fashion" OR "red carpet look")'
    enabled: true
    weight: 0.8
