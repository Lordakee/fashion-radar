# Source types used by this starter config:
# - rss: direct RSS/Atom feeds
# - gdelt: GDELT Doc API metadata search
#
# Broad social-platform collection is not part of the core workflow.
version: 1
sources:
  - name: Fashionista
    type: rss
    url: https://fashionista.com/.rss/feed/28e21eb8-20ac-4617-a448-e845081591ca.xml
    enabled: true
    weight: 1.0
    tags: [fashion_media, industry_news]
    http:
      timeout_seconds: 10
      per_domain_delay_seconds: 1
    article:
      enabled: false
    row_one_article:
      enabled: true
      max_chars: 2400
    health:
      max_failures: 3
      retention_hours: 24
  - name: Fashion Week Daily
    type: rss
    url: https://fashionweekdaily.com/feed/
    enabled: true
