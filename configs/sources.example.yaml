# Source types used by this starter config:
# - rss: direct RSS/Atom feeds
# - gdelt: GDELT Doc API metadata search
#
# Broad social-platform collection is not part of the core workflow.
version: 1
sources:
  - name: Fashionista
    type: rss
    url: https://fashionista.com/.rss/feed/28e21eb8-20ac-4617-a448-e845081591ca.xml
    enabled: true
    weight: 1.0
    tags: [fashion_media, industry_news]
    http:
      timeout_seconds: 10
      per_domain_delay_seconds: 1
    article:
      enabled: false
    health:
      max_failures: 3
      retention_hours: 24
  - name: Fashion Week Daily
    type: rss
    url: https://fashionweekdaily.com/feed/
    enabled: true
    weight: 0.9
    tags: [fashion_media, celebrity_style]
    http:
      timeout_seconds: 10
      per_domain_delay_seconds: 1
    article:
      enabled: false
    health:
      max_failures: 3
      retention_hours: 24
  - name: GDELT Luxury Fashion
    type: gdelt
    query: '(luxury fashion OR designer fashion OR "fashion week")'
    enabled: true
    weight: 0.9
    tags: [gdelt, designer_luxury, industry_news]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
    http:
      timeout_seconds: 10
      per_domain_delay_seconds: 1
    health:
      max_failures: 3
      retention_hours: 24
  - name: GDELT Celebrity Style
    type: gdelt
    query: '("celebrity style" OR "red carpet fashion" OR "red carpet look")'
    enabled: true
    weight: 0.8
    tags: [gdelt, celebrity_style]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
    http:
      timeout_seconds: 10
      per_domain_delay_seconds: 1
    health:
      max_failures: 3
      retention_hours: 24
  - name: GDELT Emerging Designers
    type: gdelt
    query: '("emerging designer" OR "independent designer" OR "LVMH Prize" OR "ANDAM fashion")'
    enabled: true
    weight: 0.8
    tags: [gdelt, emerging_designers, fashion_week]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
    http:
      timeout_seconds: 10
      per_domain_delay_seconds: 1
    health:
      max_failures: 3
      retention_hours: 24
  - name: GDELT Bags Shoes Products
    type: gdelt
    query: '("designer bag" OR handbag OR sneakers OR "ballet flats" OR loafer) (fashion OR luxury)'
    enabled: true
    weight: 0.8
    tags: [gdelt, accessories, bags, shoes]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
    http:
      timeout_seconds: 10
      per_domain_delay_seconds: 1
    health:
      max_failures: 3
      retention_hours: 24
