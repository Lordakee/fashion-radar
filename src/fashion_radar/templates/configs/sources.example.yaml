# Supported source types in v0.1.0:
# - rss: direct RSS/Atom feeds
# - rsshub: RSSHub-compatible feeds when you accept the upstream route terms
# - gdelt: GDELT Doc API metadata search
#
# Broad social-platform collection is not part of the core workflow.
version: 1
sources:
  - name: Fashionista
    type: rss
    url: https://fashionista.com/.rss/excerpt
    enabled: true
    # Source weight is used by scoring as source_weight * match_confidence.
    weight: 1.2
    tags: [fashion_media, industry_news]
    http:
      timeout_seconds: 10
      per_domain_delay_seconds: 1
    article:
      # Optional article extraction respects robots.txt and never bypasses
      # paywalls. If optional article dependencies are missing, extraction is
      # skipped conservatively.
      enabled: true
      respect_robots_txt: true
    health:
      # Source-health retention controls the temporary circuit breaker for
      # failing sources. It is not data-retention pruning for collected items.
      max_failures: 3
      retention_hours: 24
  - name: GDELT Luxury Fashion
    type: gdelt
    query: '(luxury fashion OR designer fashion OR "fashion week")'
    enabled: true
    weight: 0.9
    tags: [news_search, gdelt]
    gdelt:
      lookback_hours: 24
      max_records: 100
      rate_limit_per_second: 1.0
    http:
      timeout_seconds: 10
      per_domain_delay_seconds: 1
    health:
      max_failures: 3
      retention_hours: 24
